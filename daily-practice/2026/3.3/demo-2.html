<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>穿梭框测试题</title>
  <style>
    *{margin: 0; padding: 0;}
    li{ list-style: none;}
    .transfer{ display: flex; align-items: center; width:400px; margin: 20px auto;}
    .transfer ul{ width: 150px; height: 400px; border:1px black solid;}
    .transfer button{ height: 50px; flex-grow: 1;}
    .transfer ul li.active{ background-color: red; color: #fff;}
  </style>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>

  <!-- Don't use this in production: -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const app = document.querySelector('#app')
    const root = ReactDOM.createRoot(app)
    
    class Transfer extends React.PureComponent {
      state = {
        leftList: [
          {id: 1, isActive: false, text: 'aaa'},
          {id: 2, isActive: false, text: 'bbb'},
          {id: 3, isActive: false, text: 'ccc'},
          {id: 4, isActive: false, text: 'ddd'},
          {id: 5, isActive: false, text: 'eee'}
        ],
        rightList: [],
        disabled: true
      }

      handleClick = (index) => {
        return () => {
          let leftList = _.cloneDeep(this.state.leftList)
          leftList[index].isActive = !leftList[index].isActive
          this.setState({ leftList })
        }
      }
      disabledButton = () => {
        let ret = this.state.leftList.some(item => item.isActive)
        this.setState({
          disabled: !ret
        })
      }
      componentDidUpdate = () => {
        this.disabledButton()
      }
      handleAddRight = () => {
        const leftList = _.cloneDeep(this.state.leftList)
        const lefts = leftList.filter(item => !item.isActive)
        const rights = leftList.filter(item => item.isActive)
        this.setState({
          leftList: lefts,
          rightList: [...this.state.rightList, ...rights]
        })
      }
      render() {
        return (
          <div className='transfer'>
            <ul className='left'>
              {
                this.state.leftList.map((item, index) => <li key={item.id} onClick={this.handleClick(index)} className={item.isActive ? 'active' : ''}>{item.text}</li>)
              }
            </ul>
            <button disabled={this.state.disabled} onClick={this.handleAddRight}>→</button>
            <ul className='right'>
              {
                this.state.rightList.map(item => <li key={item.id}>{item.text}</li>)
              }
            </ul>
          </div>
        )
      }
    }

    let element = (
      <Transfer />
    )
    root.render(element)
  </script>
</body>
</html>
