<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易购物车的Hook版本</title>
    <style>
        *{margin: 0; padding: 0;}
        li{ list-style: none;}
        .cart{ width: 700px; margin: 30px auto;}
        ul{ overflow: hidden;}
        li{ width: 100px; border: 5px gray dotted; border-radius: 20px; padding: 20px; float: left; margin:10px;}
        .remove, .add{ cursor: pointer;}
        .cartbtn{ font-size:14px; text-align: center; background: red; color: white; padding: 3px; border-radius: 5px; margin-top: 10px; cursor: pointer;}
        li.active{ border-color:red;}
        li.active .cartbtn{ background-color: skyblue;}
        .all{ text-align: center; margin: 20px 0;}
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>

    <!-- Don't use this in production: -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="app"></div>
    <script type="text/babel">
        const app = document.querySelector('#app')
        const root = ReactDOM.createRoot(app)
        const { useState, useEffect } = React

        const Item = (props) => {
            const { id, isActive, name, price, number, handleAdd, handleRemove, handlerToCart } = props
            return (
                <li className={isActive ? 'active': ''}>
                    <h3>{name}</h3>
                    <p>单价：{price}</p>
                    <p>
                        数量：
                        <span onClick={handleRemove(id)}>-</span>
                        <span>{number}</span>
                        <span onClick={handleAdd(id)}>+</span>
                    </p>
                    <div className='cartbtn' onClick={handlerToCart(id)}>{ isActive ? '取消购买' : '添加到购物车' }</div>
                </li>
            )
        }

        const Cart = () => {
            const [list, setList] = useState([])
            const [all, setAll] = useState(0)

            useEffect(() => {
                fetch('data.json')
                    .then(res => res.json())
                    .then(data => {
                        if (data.errcode === 0) {
                            setList(data.list)
                        }
                    })
            }, [])

            const handleAdd = (id) => {
                return () => {
                    const cloneList = _.cloneDeep(list)
                    const now = cloneList.find(item => item.id === id)
                    now.number++
                    setList(cloneList)
                }
            }

            const handleRemove = (id) => {
                return () => {
                    const cloneList = _.cloneDeep(list)
                    const now = cloneList.find(item => item.id === id)
                    if (now.number > 1) {
                        now.number--
                    }
                    setList(cloneList)
                }
            }

            const handlerToCart = (id) => {
                return () => {
                    const cloneList = _.cloneDeep(list)
                    const now = cloneList.find(item => item.id === id)
                    now.isActive = !now.isActive
                    setList(cloneList)
                }
            }

            const computedAll = () => {
                let all = 0
                list.filter(item => item.isActive).forEach(item => {
                    all += item.price * item.number
                })
                setAll(all)
            }

            useEffect(() => {
                computedAll()
            }, [list])

            return (
                <div className='cart'>
                    <ul>
                        {
                            list.map(item => <Item key={item.id} {...item} handleAdd={handleAdd} handleRemove={handleRemove} handlerToCart={handlerToCart} />)
                        }   
                    </ul>
                    <div className='all'>总金额：<span>{all}</span>元</div>
                </div>
            )
        }
        
        let element = (
            <Cart />
        )

        root.render(element)
    </script>
</body>
</html>
