<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React 函数组件简易购物车的综合案例</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    li {
      list-style: none;
    }

    .cart {
      width: 700px;
      margin: 30px auto;
    }

    ul {
      overflow: hidden;
    }

    li {
      width: 100px;
      border: 5px gray dotted;
      border-radius: 20px;
      padding: 20px;
      float: left;
      margin: 10px;
    }

    .remove,
    .add {
      cursor: pointer;
    }

    .cartbtn {
      font-size: 14px;
      text-align: center;
      background: red;
      color: white;
      padding: 3px;
      border-radius: 5px;
      margin-top: 10px;
      cursor: pointer;
    }

    li.active {
      border-color: red;
    }

    li.active .cartbtn {
      background-color: skyblue;
    }

    .all {
      text-align: center;
      margin: 20px 0;
    }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>

  <!-- Don't use this in production: -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="app"></div>
  <script type="text/babel">
    const app = document.querySelector('#app')
    const root = ReactDOM.createRoot(app)

    const { useState, useCallback, useEffect } = React

    const Item = (props) => {
      const { id, isActive, name, price, number, handleRemove, handleAdd, handleCartBtn } = props
      return (
        <li className={isActive ? 'active' : ''}>
          <h3>{name}</h3>
          <p>单价：{price}</p>
          <p>
            数量：
            <span className='remove' onClick={handleRemove(id)}>-</span>
            <span>{number}</span>
            <span className='add' onClick={handleAdd(id)}>+</span>
          </p>
          <div className='cartbtn' onClick={handleCartBtn(id)}>{isActive ? '取消购买' : '添加到购物车'}</div>
        </li>
      )
    }

    const Cart = () => {
      const [list, setList] = useState([])
      const [all, setAll] = useState(0)

      const handleRemove = (id) => {
        return () => {
          const cloneList = _.cloneDeep(list)
          const now = cloneList.find(item => item.id === id)
          if (now.number > 1) {
            now.number--
          }
          setList(cloneList)
        }
      }

      const handleAdd = (id) => {
        return () => {
          const cloneList = _.cloneDeep(list)
          const now = cloneList.find(item => item.id === id)
          now.number++
          setList(cloneList)
        }
      }
      // 错误写法：非常经典且致命的 “闭包陷阱”，会导致你的数据更新出现逻辑错误。
      // 在 useCallback 的依赖数组中，你传入的是 []。现象：无论 list 后来变成了什么样，handleAdd 内部永远只能“看到”组件第一次渲染时的 list 初始值。
      /* const handleAdd = useCallback((id) => {
        return () => {
          const cloneList = _.cloneDeep(list)
          const now = cloneList.find(item => item.id === id)
          now.number++
          setList(cloneList)
        }
      }, []) */

      // 正确写法
      /* const handleAdd = useCallback((id) => {
        return () => {
          const cloneList = _.cloneDeep(list)
          const now = cloneList.find(item => item.id === id)
          now.number++
          setList(cloneList)
        }
      }, [list]) */

      const handleCartBtn = (id) => {
        return () => {
          const cloneList = _.cloneDeep(list)
          const now = cloneList.find(item => item.id === id)
          now.isActive = !now.isActive
          setList(cloneList)
        }
      }

      const computedAll = () => {
        let all = 0
        list.filter(item => item.isActive).forEach(item => {
          all += item.price * item.number
        })
        setAll(all)
      }

      useEffect(() => {
        fetch('data.json')
          .then(res => res.json())
          .then(data => {
            if (data.errcode === 0) {
              setList(data.list)
            }
          })
      }, [])

      useEffect(() => {
        computedAll()
      }, [list])

      return (
        <div className='cart'>
          <ul>
            {list.map(item => <Item key={item.id} {...item} handleRemove={handleRemove} handleAdd={handleAdd} handleCartBtn={handleCartBtn} />)}
          </ul>
          <div className='all'>
            总金额：<span>{all}</span>元
          </div>
        </div>
      )
    }

    let element = (
      <Cart />
    )
    root.render(element)
  </script>
</body>

</html>
