<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>使用 CSS 画一个三角形</title>
    <style>
        .triangle {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 50px solid red; /* 底部颜色即为三角形颜色 */
        }
    </style>
</head>
<body>
    <div class='triangle'></div>
</body>
</html>
