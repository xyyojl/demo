<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React 类组件简易购物车的综合案例</title>
  <style>
    *{margin: 0; padding: 0;}
    li{ list-style: none;}
    .cart{ width: 700px; margin: 30px auto;}
    ul{ overflow: hidden;}
    li{ width: 100px; border: 5px gray dotted; border-radius: 20px; padding: 20px; float: left; margin:10px;}
    .remove, .add{ cursor: pointer;}
    .cartbtn{ font-size:14px; text-align: center; background: red; color: white; padding: 3px; border-radius: 5px; margin-top: 10px; cursor: pointer;}
    li.active{ border-color:red;}
    li.active .cartbtn{ background-color: skyblue;}
    .all{ text-align: center; margin: 20px 0;}
  </style>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>

  <!-- Don't use this in production: -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const app = document.querySelector('#app')
    const root = ReactDOM.createRoot(app)

    class Item extends React.PureComponent {
      render() {
        const { id, isActive, name, price, number, handleRemove, handleAdd, handleCartBtn } = this.props
        return (
          <li className={isActive ? 'active' : ''}>
            <h3>{name}</h3>
            <p>单价：{price}</p>
            <p>
              数量：
              <span className='remove' onClick={handleRemove(id)}>-</span>
              <span>{number}</span>
              <span className='add' onClick={handleAdd(id)}>+</span>
            </p>
            <div className='cartbtn' onClick={handleCartBtn(id)}>{isActive ? '取消购买' : '添加到购物车'}</div>
          </li>
        )
      }
    }

    class Cart extends React.PureComponent {
      state = {
        list: [],
        all: 0
      }

      // 高阶函数
      handleRemove = (id) => {
        return () => {
          const list = _.cloneDeep(this.state.list)
          const now = list.find(item => item.id === id)
          if (now.number > 1) {
            now.number--
          }
          this.setState({ list })
        }
      }

      handleAdd = (id) => {
        return () => {
          const list = _.cloneDeep(this.state.list)
          const now = list.find(item => item.id === id)
          now.number++
          this.setState({ list })
        }
      }

      handleCartBtn = (id) => {
        return () => {
          const list = _.cloneDeep(this.state.list)
          const now = list.find(item => item.id === id)
          now.isActive = !now.isActive
          this.setState({ list })
        }
      }

      componentDidMount = () => {
        fetch('data.json')
          .then(res => res.json())
          .then(data => {
            if (data.errcode === 0) {
              this.setState({ list: data.list })
            }
          })
      }

      computedAll = () => {
        let all = 0
        this.state.list.filter(item => item.isActive).forEach(item => {
          all += item.price * item.number
        })
        this.setState({ all })
      }

      componentDidUpdate = () => {
        this.computedAll()
      }
      render() {
        return (
          <div className='cart'>
            <ul>
              {
                this.state.list.map(item => <Item key={item.id} {...item} handleRemove={this.handleRemove} handleAdd={this.handleAdd} handleCartBtn={this.handleCartBtn} />)
              }
            </ul>
            <div className='all'>
              总金额：<span>{this.state.all}</span>元
            </div>
          </div>
        )
      }
    }

    let element = (
      <Cart />
    )
    root.render(element)
  </script>
</body>
</html>
